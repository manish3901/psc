services:
  - type: web
    name: psc-coupens
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python scripts/init_db.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: psc-coupens-db
          property: connectionString

databases:
  - name: psc-coupens-db
    plan: free
