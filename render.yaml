services:
  - type: web
    name: psc-coupens
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # NOTE: Render Free tier doesn't support `preDeployCommand`, so we init DB in startCommand.
    # `scripts.init_db` is idempotent (create_all), safe to run on each deploy.
    startCommand: python -m scripts.init_db && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: psc-coupens-db
          property: connectionString

databases:
  - name: psc-coupens-db
    plan: free
